<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI-Infra 技术研究</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="stylesheet" href="https://unpkg.com/@fortawesome/fontawesome-free/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <!-- Top Navbar -->
  <nav class="navbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="hamburger" id="hamburgerBtn" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
      <div class="navbar-brand">
        <i class="fas fa-microchip icon"></i>
        AI-Infra 技术研究
      </div>
    </div>
    <div class="navbar-actions">
      <a href="https://github.com" target="_blank" rel="noopener" title="GitHub"><i class="fab fa-github"></i></a>
    </div>
  </nav>

  <!-- Layout -->
  <div class="layout">

    <!-- Sidebar Overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <ul class="nav-tree" id="navTree">
        <!-- Level 1: 大模型推理 -->
        <li class="nav-level1">
          <div class="nav-header" data-level="1">
            <span class="arrow open">&#9654;</span>
            <i class="fas fa-brain nav-icon"></i>
            <span>大模型推理</span>
          </div>
          <ul class="nav-children expanded">
            <!-- Level 2: KV Cache -->
            <li class="nav-level2">
              <div class="nav-header" data-level="2" data-page="kvcache">
                <span class="arrow">&#9654;</span>
                <i class="fas fa-memory nav-icon"></i>
                <span>KV Cache</span>
              </div>
            </li>
            <!-- Level 2: 投机解码 -->
            <li class="nav-level2">
              <div class="nav-header" data-level="2">
                <span class="arrow">&#9654;</span>
                <i class="fas fa-bolt nav-icon"></i>
                <span>投机解码 / Speculative Decoding</span>
              </div>
              <ul class="nav-children">
                <li class="nav-level3" data-page="eagle-v1">
                  <i class="fas fa-file-alt nav-icon"></i>
                  <span>Eagle-v1</span>
                </li>
                <li class="nav-level3" data-page="eagle-v2">
                  <i class="fas fa-file-alt nav-icon"></i>
                  <span>Eagle-v2</span>
                </li>
                <li class="nav-level3" data-page="eagle-v3">
                  <i class="fas fa-file-alt nav-icon"></i>
                  <span>Eagle-v3</span>
                </li>
              </ul>
            </li>
          </ul>
        </li>
        <!-- Level 1: 量化 -->
        <li class="nav-level1">
          <div class="nav-header" data-level="1">
            <span class="arrow">&#9654;</span>
            <i class="fas fa-compress-arrows-alt nav-icon"></i>
            <span>量化</span>
          </div>
          <ul class="nav-children">
            <!-- 预留，暂无子页面 -->
          </ul>
        </li>
      </ul>

      <!-- Sidebar Footer -->
      <div class="sidebar-footer">
        <button class="theme-toggle" id="themeToggle">
          <i class="fas fa-moon"></i>
          <div class="toggle-track">
            <div class="toggle-thumb"></div>
          </div>
          <span id="themeLabel">深色模式</span>
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main" id="mainContent">
      <div class="content-wrapper" id="contentWrapper">
        <!-- Welcome page (default) -->
        <div class="content-card">
          <div class="welcome-hero">
            <h1>AI-Infra 技术研究</h1>
            <p>探索大模型推理优化、量化技术、投机解码等 AI 基础设施前沿方向。</p>
            <div class="welcome-cards">
              <div class="welcome-card" data-target="kvcache">
                <h3><i class="fas fa-memory"></i> KV Cache</h3>
                <p>推理加速核心技术</p>
              </div>
              <div class="welcome-card" data-target="eagle-v1">
                <h3><i class="fas fa-bolt"></i> Eagle-v1</h3>
                <p>特征级投机解码</p>
              </div>
              <div class="welcome-card" data-target="eagle-v2">
                <h3><i class="fas fa-bolt"></i> Eagle-v2</h3>
                <p>动态 Draft Tree</p>
              </div>
              <div class="welcome-card" data-target="eagle-v3">
                <h3><i class="fas fa-bolt"></i> Eagle-v3</h3>
                <p>上下文感知优化</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script>
    // ========================================
    // Page Content Data
    // ========================================
    const pages = {
      'kvcache': {
        title: 'KV Cache',
        breadcrumb: ['大模型推理', 'KV Cache'],
        intro: '在自回归生成中缓存历史 Key-Value 张量，避免重复计算，是提升推理吞吐的核心技术。涉及 PagedAttention、Prefix Caching 等优化。',
        features: [
          { icon: 'fa-gauge-high', text: '避免重复计算历史 token 的 Key/Value，显著降低推理延迟' },
          { icon: 'fa-layer-group', text: 'PagedAttention：借鉴虚拟内存分页思想，按需分配显存块，减少碎片化' },
          { icon: 'fa-copy', text: 'Prefix Caching：共享相同前缀的请求复用 KV 缓存，降低多轮对话开销' },
          { icon: 'fa-compress', text: 'KV Cache 压缩：GQA、MQA 等注意力头共享方案减少缓存占用' }
        ],
        resources: [
          { icon: 'fa-file-pdf', text: 'Efficient Memory Management for Large Language Model Serving with PagedAttention', url: '#' },
          { icon: 'fa-github', text: 'vLLM — 高性能推理引擎', url: '#' },
          { icon: 'fa-book', text: 'FlashAttention: Fast and Memory-Efficient Exact Attention', url: '#' }
        ],
        updated: '2026-04-27'
      },
      'eagle-v1': {
        title: 'Eagle-v1',
        subtitle: 'Speculative Decoding — Feature-Level Draft',
        breadcrumb: ['大模型推理', '投机解码', 'Eagle-v1'],
        intro: '基于特征级别的投机解码方法，使用轻量级 draft head 从主模型隐藏状态预测未来 token，无需独立 draft 模型。',
        features: [
          { icon: 'fa-feather', text: '轻量级 Draft Head：仅一个线性层 + Transformer Block，参数量极小' },
          { icon: 'fa-link', text: '复用主模型隐藏状态，无需额外的 draft 模型，部署简单' },
          { icon: 'fa-chart-line', text: '投机接受率高于传统 n-gram / Medusa 方案' },
          { icon: 'fa-shield-halved', text: '输出分布与主模型完全一致，保证无损加速' }
        ],
        resources: [
          { icon: 'fa-file-pdf', text: 'EAGLE: Speculative Sampling Requires Rethinking Feature Uncertainty', url: '#' },
          { icon: 'fa-github', text: 'EAGLE 推理加速实现', url: '#' }
        ],
        updated: '2026-04-27'
      },
      'eagle-v2': {
        title: 'Eagle-v2',
        subtitle: 'Speculative Decoding — Dynamic Draft Tree',
        breadcrumb: ['大模型推理', '投机解码', 'Eagle-v2'],
        intro: '引入动态 draft tree 结构，根据 token 概率自适应调整树的宽度和深度，显著提升投机接受率。',
        features: [
          { icon: 'fa-tree', text: '动态树构建：根据 draft token 概率动态调整树的形状，高概率路径更深' },
          { icon: 'fa-arrows-split-up-and-left', text: 'Tree Attention：一次前向验证整个 draft tree，最大化 GPU 利用率' },
          { icon: 'fa-gauge-high', text: '接受率相比 Eagle-v1 提升 20-40%，端到端加速比更高' },
          { icon: 'fa-sliders', text: '可配置树大小，在延迟与吞吐间灵活权衡' }
        ],
        resources: [
          { icon: 'fa-file-pdf', text: 'EAGLE-2: Faster Inference of Language Models with Dynamic Draft Trees', url: '#' },
          { icon: 'fa-github', text: 'EAGLE-2 官方实现', url: '#' }
        ],
        updated: '2026-04-27'
      },
      'eagle-v3': {
        title: 'Eagle-v3',
        subtitle: 'Speculative Decoding — Context-Aware Optimization',
        breadcrumb: ['大模型推理', '投机解码', 'Eagle-v3'],
        intro: '进一步优化树结构构建策略，结合上下文感知的 token 预测，在保持高接受率的同时降低 draft 开销。',
        features: [
          { icon: 'fa-brain', text: '上下文感知 Draft：利用更丰富的上下文信息提升 token 预测准确性' },
          { icon: 'fa-scissors', text: '自适应剪枝：低概率分支提前剪除，减少无效验证计算' },
          { icon: 'fa-rotate', text: '迭代优化：draft tree 在验证反馈后动态调整，提升后续轮次接受率' },
          { icon: 'fa-rocket', text: '综合加速比超过 Eagle-v2，接近理论最优投机解码性能' }
        ],
        resources: [
          { icon: 'fa-file-pdf', text: 'EAGLE-3: Context-Aware Speculative Decoding', url: '#' },
          { icon: 'fa-github', text: 'EAGLE-3 官方实现', url: '#' }
        ],
        updated: '2026-04-27'
      }
    };

    // ========================================
    // DOM References
    // ========================================
    const navTree = document.getElementById('navTree');
    const contentWrapper = document.getElementById('contentWrapper');
    const themeToggle = document.getElementById('themeToggle');
    const themeLabel = document.getElementById('themeLabel');
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const sidebar = document.getElementById('sidebar');
    const sidebarOverlay = document.getElementById('sidebarOverlay');

    // ========================================
    // Navigation Tree Logic
    // ========================================

    // Toggle expand/collapse
    navTree.addEventListener('click', function(e) {
      const header = e.target.closest('.nav-header');
      const level3 = e.target.closest('.nav-level3');

      // Level 3 click → show page
      if (level3) {
        const page = level3.dataset.page;
        if (page && pages[page]) {
          showPage(page);
          setActive(level3);
          closeMobileSidebar();
        }
        return;
      }

      // Level 2 with page → show page AND toggle
      if (header) {
        const level = header.dataset.level;

        // Toggle subtree
        const parent = header.parentElement;
        const children = parent.querySelector('.nav-children');
        const arrow = header.querySelector('.arrow');

        if (children) {
          children.classList.toggle('expanded');
          if (arrow) arrow.classList.toggle('open');
        }

        // If this header has a page, show it
        const page = header.dataset.page;
        if (page && pages[page]) {
          showPage(page);
          setActive(header);
          closeMobileSidebar();
        }
      }
    });

    function setActive(element) {
      // Remove all active
      document.querySelectorAll('.nav-level3.active, .nav-header.active').forEach(el => {
        el.classList.remove('active');
      });
      element.classList.add('active');
    }

    // ========================================
    // Page Rendering
    // ========================================
    function showPage(pageId) {
      const page = pages[pageId];
      if (!page) return;

      const breadcrumbHtml = page.breadcrumb.map((item, i) => {
        if (i < page.breadcrumb.length - 1) {
          return `<a href="#">${item}</a><span>›</span>`;
        }
        return `<span style="color:var(--text-primary)">${item}</span>`;
      }).join('');

      const featuresHtml = page.features.map(f =>
        `<li><i class="fas ${f.icon}"></i><span>${f.text}</span></li>`
      ).join('');

      const resourcesHtml = page.resources.map(r =>
        `<li><a href="${r.url}" target="_blank"><i class="fas ${r.icon}"></i>${r.text}</a></li>`
      ).join('');

      contentWrapper.innerHTML = `
        <div class="breadcrumb">${breadcrumbHtml}</div>
        <div class="content-card" style="animation: fadeIn 0.3s ease;">
          <h1>${page.title}</h1>
          ${page.subtitle ? `<div class="subtitle">${page.subtitle}</div>` : ''}
          <div class="intro">${page.intro}</div>

          <h2><i class="fas fa-star"></i> 关键特性</h2>
          <ul class="feature-list">${featuresHtml}</ul>

          <h2><i class="fas fa-link"></i> 相关资源</h2>
          <ul class="resource-links">${resourcesHtml}</ul>

          <div class="update-date"><i class="far fa-edit"></i> 编辑于 ${page.updated}</div>
        </div>
      `;
    }

    // ========================================
    // Welcome Card Clicks
    // ========================================
    contentWrapper.addEventListener('click', function(e) {
      const card = e.target.closest('.welcome-card');
      if (card) {
        const target = card.dataset.target;
        if (target && pages[target]) {
          showPage(target);
          // Expand parent nav and set active
          expandToPage(target);
        }
      }
    });

    function expandToPage(pageId) {
      // Find the nav element for this page
      const navEl = document.querySelector(`[data-page="${pageId}"]`);
      if (!navEl) return;

      // Expand parent containers
      let parent = navEl.closest('.nav-children');
      while (parent) {
        parent.classList.add('expanded');
        const header = parent.previousElementSibling;
        if (header) {
          const arrow = header.querySelector('.arrow');
          if (arrow) arrow.classList.add('open');
        }
        parent = parent.parentElement.closest('.nav-children');
      }

      // Set active
      if (navEl.classList.contains('nav-level3')) {
        setActive(navEl);
      } else {
        setActive(navEl);
      }
    }

    // ========================================
    // Theme Toggle
    // ========================================
    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      if (theme === 'dark') {
        themeLabel.textContent = '深色模式';
        themeToggle.querySelector('i').className = 'fas fa-moon';
      } else {
        themeLabel.textContent = '浅色模式';
        themeToggle.querySelector('i').className = 'fas fa-sun';
      }
    }

    // Init theme
    const savedTheme = localStorage.getItem('theme') || 'dark';
    setTheme(savedTheme);

    themeToggle.addEventListener('click', function() {
      const current = document.documentElement.getAttribute('data-theme');
      setTheme(current === 'dark' ? 'light' : 'dark');
    });

    // ========================================
    // Mobile Sidebar
    // ========================================
    hamburgerBtn.addEventListener('click', function() {
      hamburgerBtn.classList.toggle('active');
      sidebar.classList.toggle('open');
      sidebarOverlay.classList.toggle('show');
    });

    sidebarOverlay.addEventListener('click', closeMobileSidebar);

    function closeMobileSidebar() {
      hamburgerBtn.classList.remove('active');
      sidebar.classList.remove('open');
      sidebarOverlay.classList.remove('show');
    }
  </script>
</body>
</html>
